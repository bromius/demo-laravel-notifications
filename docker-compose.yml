services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    container_name: demo-laravel-notifications-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notifications
    environment:
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: demo-laravel-notifications-nginx
    restart: unless-stopped
    ports:
      - "${DOCKER_APP_PORT:-8088}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - notifications

  mysql:
    image: mysql:8.4
    container_name: demo-laravel-notifications-mysql
    restart: unless-stopped
    ports:
      - "${DOCKER_DB_PORT:-33061}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-notifications}"
      MYSQL_USER: "${DB_USERNAME:-notifications}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-password}"
      MYSQL_ROOT_PASSWORD: "${DOCKER_DB_ROOT_PASSWORD:-root}"
    volumes:
      - demo-laravel-notifications-mysql:/var/lib/mysql
    networks:
      - notifications
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
      
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: demo-laravel-notifications-phpmyadmin
    restart: unless-stopped
    ports:
      - "${DOCKER_PHPMYADMIN_PORT:-8089}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notifications

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    container_name: demo-laravel-notifications-queue
    restart: unless-stopped
    working_dir: /var/www/html
    user: www-data
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=60
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notifications

volumes:
  demo-laravel-notifications-mysql:

networks:
  notifications:
    driver: bridge
